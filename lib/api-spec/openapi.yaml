            application/json:
              schema:
                $ref: "#/components/schemas/SchoolHealth"

  /analytics/at-risk:
    get:
      operationId: getAtRiskStudents
      tags: [analytics]
      summary: Get at-risk students list
      responses:
        "200":
          description: At-risk students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AtRiskStudent"

  /analytics/teacher-performance:
    get:
      operationId: getTeacherPerformance
      tags: [analytics]
      summary: Get teacher performance scores
      responses:
        "200":
          description: Teacher performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeacherPerformance"

  /analytics/trends:
    get:
      operationId: getAnalyticsTrends
      tags: [analytics]
      summary: Get attendance and discipline trends over time
      responses:
        "200":
          description: Trends data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsTrends"

  /analytics/dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [analytics]
      summary: Get headteacher/admin dashboard summary counts
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ─── RANKINGS ─────────────────────────────────────────────────────────
  /rankings/students:
    get:
      operationId: getStudentRankings
      tags: [rankings]
      summary: Get student rankings (class or school-wide)
      parameters:
        - name: classId
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Student rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentRanking"

  /rankings/classes:
    get:
      operationId: getClassRankings
      tags: [rankings]
      summary: Get class rankings by performance
      responses:
        "200":
          description: Class rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassRanking"

  # ─── NOTIFICATIONS ─────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get notifications for current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ─── AUTH ──────────────────────────────────────────────────────────
    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthResult:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, headteacher, dos, teacher, bursar, student, parent, club]
        avatarUrl:
          type: ["string", "null"]
        linkedId:
          type: ["integer", "null"]
      required: [id, username, name, role]

    # ─── STUDENTS ─────────────────────────────────────────────────────
    Student:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dateOfBirth:
